# =============================================================================
# Portal — https://smartlist.uz  →  Next.js container on 127.0.0.1:3000
#
# Install:
#   sudo cp deploy/nginx/smartlist.uz.conf /etc/nginx/sites-available/smartlist.uz
#   sudo ln -s /etc/nginx/sites-available/smartlist.uz /etc/nginx/sites-enabled/
#   sudo nginx -t && sudo systemctl reload nginx
#   sudo certbot --nginx -d smartlist.uz -d www.smartlist.uz
#
# certbot --nginx rewrites this file in place: it adds the `listen 443 ssl`
# block, the ssl_certificate lines, and an HTTP→HTTPS redirect. Start with this
# plain :80 block so nginx loads before any certificate exists.
# =============================================================================
server {
    listen 80;
    listen [::]:80;
    server_name smartlist.uz www.smartlist.uz;

    # The portal (and the Mustang API) accept bodies up to 25 MB. Nginx defaults
    # to 1 MB and would 413 large uploads before they reach the app.
    client_max_body_size 25m;

    location / {
        # The portal container binds 127.0.0.1:3000 on the host (see
        # docker-compose.yml `ports: 127.0.0.1:${PORTAL_PORT:-3000}:3000`).
        proxy_pass http://127.0.0.1:3000;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        # Next.js dev/websocket + streaming responses.
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
    }
}
