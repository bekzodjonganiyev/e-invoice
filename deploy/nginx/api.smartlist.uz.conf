# =============================================================================
# Gateway API — https://api.smartlist.uz  →  APISIX edge on 127.0.0.1:9080
#
# APISIX is the real gateway: it forward-auths every request against the NestJS
# gateway and proxies allowed calls to the Mustang upstream. Nginx here only
# terminates TLS for the public hostname and hands the raw request to APISIX;
# it does NOT authenticate — that is APISIX + the gateway's job.
#
# Install:
#   sudo cp deploy/nginx/api.smartlist.uz.conf /etc/nginx/sites-available/api.smartlist.uz
#   sudo ln -s /etc/nginx/sites-available/api.smartlist.uz /etc/nginx/sites-enabled/
#   sudo nginx -t && sudo systemctl reload nginx
#   sudo certbot --nginx -d api.smartlist.uz
# =============================================================================
server {
    listen 80;
    listen [::]:80;
    server_name api.smartlist.uz;

    # Mustang endpoints (xmltopdf, combine, upload…) accept multipart bodies up
    # to 25 MB. Keep this in step with the mock's express body limit.
    client_max_body_size 25m;

    location / {
        # APISIX publishes 9080 on the host (its own compose stack). APISIX routes
        # match on path (uris: /*), not Host, so passing $host through is fine.
        proxy_pass http://127.0.0.1:9080;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }
}
